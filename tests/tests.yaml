  # -- Live + performance: timed, measured runs (slowest) --
  full-overwrite-unions:
    # scope:
    #   users: 3
    #   repos: 2
    #   perms: 5
    # cost:
    #   bigO: O(U+R)
    #   reads:
    #     users: all
    #     repos: all
    #     userPermScans: 0
    #   writes: 2 mutations
    description: >-
      Full set mode unions users across rules, overwrites mapped repos, and
      leaves unmapped repos alone. Pending bindIDs ride along: one on a
      mapped repo must survive its overwrite, one on an unmapped canary
      must stay untouched -- live runs seed, verify, and restore them
      against the real instance.
    modes:
      - local
      - live
      - performance
    args:
      command: set
      full: true
      apply: true
      no_backup: true
    expectedMutations: 2

