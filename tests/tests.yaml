# Registry of end-to-end test cases.
#
# Each key under `cases:` may have a matching directory in tests/e2e/fixtures/
# holding the case's state files. The directory is only required when the
# case actually uses files:
#   before.json   instance state before the run (providers, services, users,
#                 repos with explicitPermissionsUsers). Required for local
#                 mode and for mutating (--apply) live/performance runs.
#   maps.yaml     the mapping rules under test. Required for set commands
#                 that do not pass their own --maps-path.
#   after.json    expected state after the run (omit when state must NOT
#                 change: no-op cases and expected-error cases)
# A read-only non-set command (e.g. `get --users x`) needs no directory.
#
# Case fields:
#   description       What the case proves.
#   modes             Where the case runs: local, live, performance.
#                       local        run the CLI in-process against an
#                                    in-memory instance built from before.json;
#                                    assert the full resulting state
#                       live         run cliCommand against the .env test
#                                    instance. Read-only commands just assert
#                                    exit code and expectedErrors. Mutating
#                                    commands (--apply) first seed the
#                                    before.json state onto the involved
#                                    repos, run, verify the result with an
#                                    independent GraphQL read-back, and
#                                    finally restore the original state.
#                                    Live cases must use REAL instance
#                                    users/repos in their fixture files, and
#                                    exact selectors only (users:
#                                    usernames/emails, repos: names).
#                       performance  same as live, but timed and measured
#                                    (traces, RSS sampling, TSV row)
#   args              State cases: the command plus Config fields (`command`
#                     plus snake_case field names; true = bare flag, lists =
#                     comma-joined values). ONE mapping drives BOTH
#                     entrypoints: locally the case runs twice -- the
#                     generated command line through the real argument
#                     parser, and the same mapping through the Python import
#                     API (cli.Config + resolve_command + run_command) --
#                     and both must produce the identical expected state.
#                     Flags come from the Config field metadata, never
#                     guessed. maps_path defaults to the case directory's
#                     maps.yaml for set commands.
#   cliCommand        Replay cases only: raw CLI arguments for asserting
#                     argv-level parser behavior (rejections, help, exit
#                     codes), which has no import-API equivalent.
#   expectedMutations Exact number of permission mutations the run must make.
#   expectedErrors    The command must FAIL, every substring must appear in
#                     the failure, and state must be unchanged.
#   live.involvedRepos        For mutating instance runs: extra repos to
#                     capture, seed, verify, and restore beyond the fixture
#                     state and exact rule names. Required when rules use
#                     non-exact repo selectors (regexes): declare every repo
#                     the selector can match. Involved repos absent from
#                     after.json are canaries that must read back unchanged.
#   live.usersWithoutOtherGrants  Preflight: these users must hold no
#                     explicit grants outside the involved repos, making
#                     globally-scoped modes (--users-without-explicit-perms)
#                     deterministic.
#   expectedExitCode  Either of these makes the case replay-style: assert the
#   expectedOutput    exit code and output substrings instead of instance
#                     state. Locally, replay cases run the real argument
#                     parser in-process and need no fixture files.
#
# `{user}` in a cliCommand resolves to the configured --user on the test
# instance (live/performance modes only).
#
# Each case carries two comment maps sizing its work:
#
# scope: -- net state change between before.json and after.json:
#   users: distinct users whose explicit grants change
#   repos: repos whose explicit or pending grant lists change
#   perms: grant additions + removals (user-repo pairs, incl. pending
#          bindIDs)
# Rejections, expected errors, dry runs, no-ops, and read-only gets affect
# nothing. Overwrite mutations that resend an identical list count in
# expectedMutations but not here.
#
# cost: -- the reads + writes driving runtime:
#   bigO: complexity class. U = user count, R = repo count,
#         U*scan = per-user explicit-grant scan (the ~400 s tier)
#   reads:
#     users: user-metadata records fetched (paged, fast)
#     repos: repo records fetched (paged, fast)
#     userPermScans: per-user explicit-grant reads -- the DOMINANT cost:
#                    the server materializes every accessible repo per
#                    probe (~25 users/s; all ~ 400 s live)
#   writes: GraphQL permission mutations (= expectedMutations)
#   note: what bounds or skips the work
# `all` means a full-instance scan: 10,000 users / 50,000 repos on the
# live instance (tests/setup.yaml); locally it is the fixture's tiny
# counts, so every local run is sub-second regardless of class.
# Live harness seeding/verify/restore overhead is excluded.

cases:

  # -- Local parse replays: argument validation, in-process, no files (fastest) --
  reject-bare-invocation:
    # scope:
    #   users: 0
    #   repos: 0
    #   perms: 0
    # cost:
    #   bigO: O(1)
    #   note: parse-only -- no instance reads or writes
    description: A bare invocation without a command prints usage and exits 2.
    modes:
      - local
    cliCommand: ""
    expectedExitCode: 2
    expectedOutput:
      - "the following arguments are required: COMMAND"

  reject-unknown-command:
    # scope:
    #   users: 0
    #   repos: 0
    #   perms: 0
    # cost:
    #   bigO: O(1)
    #   note: parse-only -- no instance reads or writes
    description: An unknown subcommand is rejected with the valid choices.
    modes:
      - local
    cliCommand: bogus
    expectedExitCode: 2
    expectedOutput:
      - "invalid choice: 'bogus'"

  reject-two-commands:
    # scope:
    #   users: 0
    #   repos: 0
    #   perms: 0
    # cost:
    #   bigO: O(1)
    #   note: parse-only -- no instance reads or writes
    description: Two subcommands in one invocation are rejected.
    modes:
      - local
    cliCommand: get set
    expectedExitCode: 2
    expectedOutput:
      - unrecognized arguments

  reject-get-apply:
    # scope:
    #   users: 0
    #   repos: 0
    #   perms: 0
    # cost:
    #   bigO: O(1)
    #   note: parse-only -- no instance reads or writes
    description: get is read-only; --apply is rejected.
    modes:
      - local
    cliCommand: get --apply
    expectedExitCode: 2
    expectedOutput:
      - unrecognized arguments

  reject-get-full:
    # scope:
    #   users: 0
    #   repos: 0
    #   perms: 0
    # cost:
    #   bigO: O(1)
    #   note: parse-only -- no instance reads or writes
    description: --full requires the set command.
    modes:
      - local
    cliCommand: get --full
    expectedExitCode: 2
    expectedOutput:
      - unrecognized arguments

  reject-malformed-date:
    # scope:
    #   users: 0
    #   repos: 0
    #   perms: 0
    # cost:
    #   bigO: O(1)
    #   note: parse-only -- no instance reads or writes
    description: dates must match YYYY-MM-DD before any network call.
    modes:
      - local
    cliCommand: get --created-after 2026-1-01
    expectedExitCode: 2
    expectedOutput:
      - string_pattern_mismatch

  reject-user-filter-conflict:
    # scope:
    #   users: 0
    #   repos: 0
    #   perms: 0
    # cost:
    #   bigO: O(1)
    #   note: parse-only -- no instance reads or writes
    description: user filters are mutually exclusive.
    modes:
      - local
    cliCommand: get --users test_user_09991 --users-without-explicit-perms
    expectedExitCode: 2
    expectedOutput:
      - choose only one of --users

  reject-user-and-repo-filters:
    # scope:
    #   users: 0
    #   repos: 0
    #   perms: 0
    # cost:
    #   bigO: O(1)
    #   note: parse-only -- no instance reads or writes
    description: user filters and repo filters cannot be combined.
    modes:
      - local
    cliCommand: get --users test_user_09991 --repos test-repo-49981
    expectedExitCode: 2
    expectedOutput:
      - choose either user filters or repo filters

  reject-repo-filter-conflict:
    # scope:
    #   users: 0
    #   repos: 0
    #   perms: 0
    # cost:
    #   bigO: O(1)
    #   note: parse-only -- no instance reads or writes
    description: repo filters are mutually exclusive.
    modes:
      - local
    cliCommand: get --repos test-repo-49981 --repos-without-explicit-perms
    expectedExitCode: 2
    expectedOutput:
      - choose only one of --repos

  reject-repos-created-after-malformed:
    # scope:
    #   users: 0
    #   repos: 0
    #   perms: 0
    # cost:
    #   bigO: O(1)
    #   note: parse-only -- no instance reads or writes
    description: repo creation dates must match YYYY-MM-DD at parse time.
    modes:
      - local
    cliCommand: get --repos-created-after 2026-1-01
    expectedExitCode: 2
    expectedOutput:
      - string_pattern_mismatch

  reject-get-removed-repositories-created-after:
    # scope:
    #   users: 0
    #   repos: 0
    #   perms: 0
    # cost:
    #   bigO: O(1)
    #   note: parse-only -- no instance reads or writes
    description: >-
      The removed --repositories-created-after spelling stays removed; the
      flag is --repos-created-after.
    modes:
      - local
    cliCommand: get --repositories-created-after 2026-01-01
    expectedExitCode: 2
    expectedOutput:
      - "unrecognized arguments: --repositories-created-after"

  reject-verbosity-conflict:
    # scope:
    #   users: 0
    #   repos: 0
    #   perms: 0
    # cost:
    #   bigO: O(1)
    #   note: parse-only -- no instance reads or writes
    description: the --verbose and --quiet log-level aliases are mutually exclusive.
    modes:
      - local
    cliCommand: get --users username_doesnt_exist_01 --verbose --quiet
    expectedExitCode: 2
    expectedOutput:
      - choose only one of --verbose/-v, --quiet/-q, or --silent/-s

  reject-bare-set:
    # scope:
    #   users: 0
    #   repos: 0
    #   perms: 0
    # cost:
    #   bigO: O(1)
    #   note: parse-only -- no instance reads or writes
    description: set requires an explicit mode flag.
    modes:
      - local
    cliCommand: set
    expectedExitCode: 2
    expectedOutput:
      - set requires one of --full

  reject-set-full-and-users:
    # scope:
    #   users: 0
    #   repos: 0
    #   perms: 0
    # cost:
    #   bigO: O(1)
    #   note: parse-only -- no instance reads or writes
    description: set modes are mutually exclusive.
    modes:
      - local
    cliCommand: set --full --users test_user_09991
    expectedExitCode: 2
    expectedOutput:
      - choose at most one

  reject-set-user-filter-conflict:
    # scope:
    #   users: 0
    #   repos: 0
    #   perms: 0
    # cost:
    #   bigO: O(1)
    #   note: parse-only -- no instance reads or writes
    description: set user filters are mutually exclusive.
    modes:
      - local
    cliCommand: set --users test_user_09991 --users-without-explicit-perms
    expectedExitCode: 2
    expectedOutput:
      - choose only one of --users

  reject-set-full-and-created-after:
    # scope:
    #   users: 0
    #   repos: 0
    #   perms: 0
    # cost:
    #   bigO: O(1)
    #   note: parse-only -- no instance reads or writes
    description: full overwrite cannot be combined with the additive date filter.
    modes:
      - local
    cliCommand: set --full --created-after 2099-01-01
    expectedExitCode: 2
    expectedOutput:
      - "--full cannot be combined with --created-after"

  reject-set-restore-path:
    # scope:
    #   users: 0
    #   repos: 0
    #   perms: 0
    # cost:
    #   bigO: O(1)
    #   note: parse-only -- no instance reads or writes
    description: "--restore-path belongs to restore; set does not accept it."
    modes:
      - local
    cliCommand: set --restore-path definitely-missing.json
    expectedExitCode: 2
    expectedOutput:
      - "unrecognized arguments: --restore-path"

  reject-bare-restore:
    # scope:
    #   users: 0
    #   repos: 0
    #   perms: 0
    # cost:
    #   bigO: O(1)
    #   note: parse-only -- no instance reads or writes
    description: restore requires a snapshot path.
    modes:
      - local
    cliCommand: restore
    expectedExitCode: 2
    expectedOutput:
      - restore requires --restore-path

  reject-restore-with-users:
    # scope:
    #   users: 0
    #   repos: 0
    #   perms: 0
    # cost:
    #   bigO: O(1)
    #   note: parse-only -- no instance reads or writes
    description: restore does not take user filters.
    modes:
      - local
    cliCommand: restore --restore-path definitely-missing.json --users test_user_09991
    expectedExitCode: 2
    expectedOutput:
      - unrecognized arguments

  reject-restore-repos:
    # scope:
    #   users: 0
    #   repos: 0
    #   perms: 0
    # cost:
    #   bigO: O(1)
    #   note: parse-only -- no instance reads or writes
    description: restore does not take repo filters.
    modes:
      - local
    cliCommand: restore --restore-path definitely-missing.json --repos test-repo-49981
    expectedExitCode: 2
    expectedOutput:
      - "unrecognized arguments: --repos"

  reject-restore-sync-saml-orgs:
    # scope:
    #   users: 0
    #   repos: 0
    #   perms: 0
    # cost:
    #   bigO: O(1)
    #   note: parse-only -- no instance reads or writes
    description: "--sync-saml-orgs belongs to set; restore does not accept it."
    modes:
      - local
    cliCommand: restore --restore-path definitely-missing.json --sync-saml-orgs
    expectedExitCode: 2
    expectedOutput:
      - "unrecognized arguments: --sync-saml-orgs"

  reject-bare-sync-saml-orgs:
    # scope:
    #   users: 0
    #   repos: 0
    #   perms: 0
    # cost:
    #   bigO: O(1)
    #   note: parse-only -- no instance reads or writes
    description: >-
      sync-saml-orgs requires an explicit mode: --full for a whole-instance
      sync, or a user filter for a scoped sync.
    modes:
      - local
    cliCommand: sync-saml-orgs
    expectedExitCode: 2
    expectedOutput:
      - >-
        sync-saml-orgs requires one of --full, --users,
        --users-without-explicit-perms, or --created-after

  reject-sync-saml-orgs-full-and-users:
    # scope:
    #   users: 0
    #   repos: 0
    #   perms: 0
    # cost:
    #   bigO: O(1)
    #   note: parse-only -- no instance reads or writes
    description: "--full means all users; combining it with a user filter is contradictory."
    modes:
      - local
    cliCommand: sync-saml-orgs --full --users username_doesnt_exist_01
    expectedExitCode: 2
    expectedOutput:
      - "choose at most one of --full, --users"

  reject-sync-saml-orgs-full-and-created-after:
    # scope:
    #   users: 0
    #   repos: 0
    #   perms: 0
    # cost:
    #   bigO: O(1)
    #   note: parse-only -- no instance reads or writes
    description: "--full means all users; combining it with --created-after is contradictory."
    modes:
      - local
    cliCommand: sync-saml-orgs --full --created-after 2099-01-01
    expectedExitCode: 2
    expectedOutput:
      - "--full cannot be combined with --created-after"

  reject-sync-saml-orgs-repos:
    # scope:
    #   users: 0
    #   repos: 0
    #   perms: 0
    # cost:
    #   bigO: O(1)
    #   note: parse-only -- no instance reads or writes
    description: sync-saml-orgs takes user filters, never repo filters.
    modes:
      - local
    cliCommand: sync-saml-orgs --repos test-repo-49981
    expectedExitCode: 2
    expectedOutput:
      - "unrecognized arguments: --repos"

  reject-sync-saml-orgs-restore-path:
    # scope:
    #   users: 0
    #   repos: 0
    #   perms: 0
    # cost:
    #   bigO: O(1)
    #   note: parse-only -- no instance reads or writes
    description: "--restore-path belongs to restore; sync-saml-orgs does not accept it."
    modes:
      - local
    cliCommand: sync-saml-orgs --restore-path definitely-missing.json
    expectedExitCode: 2
    expectedOutput:
      - "unrecognized arguments: --restore-path"

  # -- Local state cases: full CLI runs against an in-memory instance --
  and-filters-intersect:
    # scope:
    #   users: 1
    #   repos: 1
    #   perms: 1
    # cost:
    #   bigO: O(U+R)
    #   reads:
    #     users: all
    #     repos: all
    #     userPermScans: 0
    #   writes: 1 mutation
    description: >-
      Multiple user filters AND together: both users are in the SAML group,
      but only test_user_09991 matches the email filter.
    modes:
      - local
    args:
      command: set
      full: true
      apply: true
      no_backup: true
    expectedMutations: 1

  regex-filters-scope:
    # scope:
    #   users: 2
    #   repos: 2
    #   perms: 4
    # cost:
    #   bigO: O(U+R)
    #   reads:
    #     users: all
    #     repos: all
    #     userPermScans: 0
    #   writes: 2 mutations
    description: >-
      Email and repo-name regex filters scope grants to matching users and
      repos only. Live, the declared involvedRepos cover the full closed
      regex range; the unmatched repos in it are canaries that must read
      back unchanged, which catches a widened repo regex.
    modes:
      - local
      - live
      - performance
    args:
      command: set
      full: true
      apply: true
      no_backup: true
    live:
      involvedRepos:
        - test-repo-49980
        - test-repo-49981
        - test-repo-49982
        - test-repo-49983
        - test-repo-49984
        - test-repo-49985
        - test-repo-49986
        - test-repo-49987
        - test-repo-49988
        - test-repo-49989
    expectedMutations: 2

  saml-group-filter:
    # scope:
    #   users: 1
    #   repos: 2
    #   perms: 2
    # cost:
    #   bigO: O(U+R)
    #   reads:
    #     users: all
    #     repos: all
    #     userPermScans: 0
    #   writes: 2 mutations
    description: >-
      authProvider samlGroup filter grants Bitbucket repos only to users whose
      SAML assertion includes the group.
    modes:
      - local
    args:
      command: set
      full: true
      apply: true
      no_backup: true
    expectedMutations: 2

  saml-group-live:
    # scope:
    #   users: 2
    #   repos: 2
    #   perms: 4
    # cost:
    #   bigO: O(U+R)
    #   reads:
    #     users: all
    #     repos: all
    #     userPermScans: 0
    #   writes: 2 mutations
    description: >-
      authProvider samlGroup filter against the FABRICATED SAML accounts
      that tests/setup.py provisions (setup.yaml samlAccounts): eng-group
      members gain the mapped repos; the sales-only and no-group users are
      canaries proving the selector does not widen. The local fixture
      mirrors the instance state exactly, so local and live assert the
      same behavior.
    modes:
      - local
      - live
    live:
      requiredSamlGroups:
        test_user_09991:
          - perms-sync-test-eng
        test_user_09992:
          - perms-sync-test-eng
          - perms-sync-test-sales
        test_user_09993:
          - perms-sync-test-sales
        test_user_09994: []
      involvedRepos:
        - test-repo-49993
    args:
      command: set
      full: true
      apply: true
      no_backup: true
    expectedMutations: 2

  set-created-after-temp-user:
    # scope:
    #   users: 1
    #   repos: 1
    #   perms: 1
    # cost:
    #   bigO: O(R)
    #   reads:
    #     users: 1
    #     repos: all
    #     userPermScans: 1
    #   writes: 1 mutation
    #   note: server-side date filter selects only the temp user
    description: >-
      POSITIVE created-after selection on the real instance: the harness
      creates a fresh temporary user (created today), so
      --created-after {today} selects exactly that user out of 10k
      pre-existing ones; the mapped grant lands and the canary repo stays
      empty. The temp user is hard-deleted afterwards.
    modes:
      - live
    live:
      temporaryUsers:
        - perms_sync_temp_user_01
      involvedRepos:
        - test-repo-49912
    args:
      command: set
      created_after: "{today}"
      apply: true
      no_backup: true
    expectedMutations: 1

  set-users-created-after:
    # scope:
    #   users: 2
    #   repos: 2
    #   perms: 4
    # cost:
    #   bigO: O(R)
    #   reads:
    #     users: selected
    #     repos: all
    #     userPermScans: selected
    #   writes: 4 mutations
    #   note: server-side date filter
    description: >-
      createdAfter mode additively grants mapped repos to users created
      on/after the date, preserving existing grants.
    modes:
      - local
    args:
      command: set
      created_after: "2026-02-01"
      apply: true
      no_backup: true

    expectedMutations: 4

  set-users-without-explicit-perms:
    # scope:
    #   users: 1
    #   repos: 2
    #   perms: 2
    # cost:
    #   bigO: O(U+R)
    #   reads:
    #     users: all
    #     repos: all
    #     userPermScans: rule-matched
    #   writes: 2 mutations
    #   note: candidates + hydration for all users; perm probes only for rule-matched
    description: >-
      --users-without-explicit-perms additively grants mapped repos only to
      users who currently hold no explicit grants anywhere. The local
      fixture spans multiple site-user pages (page cap 2), which is what
      catches selection truncation bugs like the 2026-06-10 first-page-only
      one. Pins --explicit-permissions-batch-size to the smallest batch to
      exercise the batching loop; the real-instance performance run lives in
      set-users-without-explicit-perms-default-batch so the performance
      tier measures the default configuration, not this degraded one.
    modes:
      - local
    args:
      command: set
      users_without_explicit_perms: true
      apply: true
      no_backup: true
      explicit_permissions_batch_size: 1
    expectedMutations: 2

  set-users-without-explicit-perms-default-batch:
    # scope:
    #   users: 1
    #   repos: 2
    #   perms: 2
    # cost:
    #   bigO: O(U+R)
    #   reads:
    #     users: all
    #     repos: all
    #     userPermScans: rule-matched
    #   writes: 2 mutations
    #   note: candidates + hydration for all users; perm probes only for rule-matched
    description: >-
      Performance-tier twin of set-users-without-explicit-perms at default
      --parallelism and --explicit-permissions-batch-size, so the measured
      timing reflects what customers run. Rule matching happens before the
      expensive per-user explicit-permission probes, so this should stay
      fast even on a 10k-user instance when the maps rules match few users.
    modes:
      - performance
    live:
      usersWithoutOtherGrants:
        - test_user_09961
        - test_user_09962
    args:
      command: set
      users_without_explicit_perms: true
      apply: true
      no_backup: true
    expectedMutations: 2

  set-repos-without-explicit-perms:
    # scope:
    #   users: 2
    #   repos: 1
    #   perms: 2
    # cost:
    #   bigO: O(U*scan + R)
    #   reads:
    #     users: all
    #     repos: all
    #     userPermScans: all
    #   writes: 1 mutation
    #   note: mode forces the full before-snapshot
    description: >-
      --repos-without-explicit-perms overwrites only repos that currently
      have no explicit grants. Runs in the performance tier on the instance
      because the mode requires a full before-snapshot (a 10k-user scan).
    modes:
      - local
      - performance
    args:
      command: set
      repos_without_explicit_perms: true
      apply: true
      no_backup: true
    expectedMutations: 1

  set-repos-created-after:
    # scope:
    #   users: 2
    #   repos: 1
    #   perms: 2
    # cost:
    #   bigO: O(U)
    #   reads:
    #     users: all
    #     repos: date-matched
    #     userPermScans: 0
    #   writes: 1 mutation
    #   note: createdAt-ordered repo scan stops at the threshold
    description: >-
      --repos-created-after scopes the overwrite to repos created on/after
      the date.
    modes:
      - local
    args:
      command: set
      repos_created_after: "2026-02-01"
      apply: true
      no_backup: true
    expectedMutations: 1

  full-overwrite-dry-run:
    # scope:
    #   users: 0
    #   repos: 0
    #   perms: 0
    # cost:
