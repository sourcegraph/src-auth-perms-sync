# Auth provider → code host connection mapping rules
# Maintain this file using auth-providers.yaml and code-hosts.yaml as references.
# Those files are generated under src-auth-perms-sync-runs/<endpoint>/.
#
# These examples cover every supported filter field:
# - users.authProvider: clientID, configID, displayName, samlGroup, serviceID, type
# - users.emails (verified email addresses)
# - users.usernames
# - repos.codeHostConnection: config, displayName, id, kind, url
# - repos.names
# - repos.regexes

maps:

- name: SAML group users get all repos synced from one service account
  users:
    authProvider:
      configID: okta
      samlGroup: LOB1-GROUP1
      type: saml
  repos:
    codeHostConnection:
      config:
        username: LOB1-SA1

- name: Users from one exact auth provider get repos from one exact code host connection
  users:
    authProvider:
      clientID: sourcegraph
      displayName: Okta SAML
      serviceID: https://idp.example.com/saml
  repos:
    codeHostConnection:
      id: 12

- name: All Okta SAML users get access to all Bitbucket repos
  users:
    authProvider:
      configID: okta
      type: saml
  repos:
    codeHostConnection:
      kind: BITBUCKETSERVER

- name: All builtin users get repos from the GitHub Cloud connection
  users:
    authProvider:
      type: builtin
  repos:
    codeHostConnection:
      displayName: GitHub Cloud

- name: All builtin users get repos from the GitHub URL connection
  users:
    authProvider:
      type: builtin
  repos:
    codeHostConnection:
      url: https://github.com/

- name: Exact user gets named repos
  users:
    emails:
      - alice@example.com
      - bob@example.com
  repos:
    names:
      - github.com/example/private-repo

- name: All builtin users get access to all repos under the github.com/example org, from any code host connection
  users:
    authProvider:
      type: builtin
  repos:
    regexes:
      - ^github\.com/example/.*
      - ^gitlab\.com/example/.*
